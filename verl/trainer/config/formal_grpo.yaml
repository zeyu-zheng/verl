defaults:
  - ppo_trainer
  - _self_

# Formal-math (Lean 4) GRPO config for Qwen3.5-{4B,9B}. Mirrors
# ``formal_ppo.yaml`` on data / rollout / actor knobs so 9B-PPO and 9B-GRPO
# results are directly comparable.

max_model_len: 18432

actor_rollout_ref:
  actor:
    fsdp_config:
      model_dtype: bfloat16
    ppo_mini_batch_size: 16
    # Pack micro-batches by token budget. Lean proofs span 100..16k tokens,
    # so fixed-shape padding wastes FA3 cycles. Flag cascades to ref / rollout
    # / critic log-prob workers via oc.select.
    use_dynamic_bsz: True
    ppo_max_token_len_per_gpu: ${max_model_len}
    clip_ratio_high: 0.28
    use_kl_loss: False
    policy_loss:
      loss_mode: vanilla
    optim:
      lr: 1e-5
  model:
    trust_remote_code: True
  ref:
    fsdp_config:
      model_dtype: bfloat16
    log_prob_micro_batch_size_per_gpu: 1
  rollout:
    name: vllm
    gpu_memory_utilization: 0.55
    log_prob_micro_batch_size_per_gpu: 1
    max_num_batched_tokens: ${max_model_len}
    max_model_len: ${max_model_len}
    n: 8
    calculate_log_probs: True
    val_kwargs:
      top_p: 0.95
      temperature: 0.6
      n: 4
      do_sample: True

critic:
  model:
    fsdp_config:
      model_dtype: bfloat16

algorithm:
  adv_estimator: grpo
  norm_adv_by_std_in_grpo: False
  use_kl_in_reward: False
  rollout_correction:
    rollout_is: token
    rollout_is_threshold: 2.0

data:
  # Formal Lean tasks are pure code-completion: thinking mode fills the
  # response budget with <think>...</think> tokens the verifier ignores.
  apply_chat_template_kwargs: {"enable_thinking": false}
  filter_overlong_prompts: True
  max_prompt_length: 2048
  max_response_length: 16384
  shuffle: True
  train_batch_size: 64
  trust_remote_code: True

reward_model:
  use_reward_loop: False

trainer:
  project_name: FBI-${oc.env:USER,zeyu-zheng}
  group_name: ${oc.env:EXPERIMENT,formal_grpo}
  experiment_name: ${oc.env:EXPERIMENT,formal_grpo}
  n_gpus_per_node: 4
  nnodes: 1
  save_freq: 0
  test_freq: 5
  max_actor_ckpt_to_keep: 1
  total_epochs: 30
  val_before_train: False
